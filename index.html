<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f97316" />
  <meta name="description" content="Official app for the Swoyersville Chicken Wing Fling — vote, map, apply, and sponsor!" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wing Fling" />
  <!-- <link rel="manifest" href="manifest.json" /> -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Oswald:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Firebase Scripts (Compat version for HTML) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <title>Swoyersville Chicken Wing Fling</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f97316;
      --orange-light: #fb923c;
      --red: #dc2626;
      --bg: #111111;
      --bg2: #1a1a1a;
      --bg3: #0d0d0d;
      --border: #2a2a2a;
      --text: #ffffff;
      --muted: #888888;
      --dim: #555555;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      overscroll-behavior-y: none;
    }

    /* ── HEADER ── */
    .header {
      background: var(--bg);
      border-bottom: 3px solid var(--orange);
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px 0;
    }
    .logo-badge {
      width: 58px; height: 58px;
      background: #000;
      border-radius: 50%;
      border: 3px solid var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(249,115,22,0.4);
    }
    .header-text { flex: 1; min-width: 0; }
    .header-sup {
      font-family: 'Oswald', sans-serif;
      font-size: 9px; letter-spacing: 4px;
      color: var(--orange); text-transform: uppercase;
    }
    .header-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 22px; color: var(--text);
      letter-spacing: 0.5px; line-height: 1.1;
    }
    .header-title span { color: var(--orange); }
    .header-date {
      font-family: 'Oswald', sans-serif;
      font-size: 10px; color: var(--dim);
      letter-spacing: 1px; text-align: right;
      white-space: nowrap;
    }
    nav {
      display: flex;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }
    .nav-btn {
      background: transparent; border: none;
      border-bottom: 3px solid transparent;
      color: var(--muted);
      padding: 10px 18px;
      cursor: pointer;
      font-family: 'Oswald', sans-serif;
      font-size: 13px; letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-btn:hover { color: var(--orange); }
    .nav-btn.active { color: var(--orange); border-bottom-color: var(--orange); }

    /* ── MAIN ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 16px 100px;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 24px;
    }
    .section-header h2 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 26px; color: var(--text);
      white-space: nowrap; letter-spacing: 1px;
    }
    .section-header h2 span { color: var(--orange); }
    .divider-line {
      flex: 1; height: 2px;
      background: linear-gradient(90deg, var(--orange), transparent);
    }

    /* ── VOTE ── */
    .vote-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .vendor-card {
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 18px 18px 18px 22px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .vendor-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 4px; height: 100%;
      background: var(--orange);
    }
    .vendor-card:hover { border-color: var(--orange); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(249,115,22,0.2); }
    .vendor-card.voted { border-color: var(--orange); }
    .vendor-card.winner { border-color: var(--orange); background: #1e1008; }
    .vendor-card.done { cursor: default; }
    .vendor-card.done:hover { transform: none; box-shadow: none; }
    .winner-badge {
      position: absolute; top: 10px; right: 10px;
      background: var(--orange); color: #000;
      font-family: 'Oswald', sans-serif;
      font-size: 9px; font-weight: 700;
      padding: 3px 8px; border-radius: 2px;
      letter-spacing: 2px;
    }
    .card-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .vendor-name { font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); }
    .vendor-specialty { font-size: 13px; color: var(--orange); margin-top: 3px; }
    .vendor-booth { font-family: 'Oswald', sans-serif; font-size: 10px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .vote-count { font-family: 'Black Han Sans', sans-serif; font-size: 30px; color: var(--orange); text-align: right; }
    .vote-label { font-size: 9px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; text-align: right; }
    .vote-btn {
      margin-top: 14px; width: 100%;
      background: var(--orange); color: #000;
      border: none; border-radius: 3px;
      padding: 10px 0;
      font-family: 'Oswald', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s;
    }
    .vote-btn:hover { background: var(--orange-light); }
    .voted-badge {
      margin-top: 14px; width: 100%;
      background: transparent;
      border: 2px solid var(--orange); color: var(--orange);
      border-radius: 3px; padding: 8px 0;
      font-family: 'Oswald', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      text-align: center;
    }

    /* ── MAP ── */
    .map-container {
      background: var(--bg3);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 18px;
      margin-bottom: 24px;
    }
    .map-title {
      font-family: 'Oswald', sans-serif;
      font-size: 10px; letter-spacing: 4px;
      color: var(--orange); text-transform: uppercase;
      text-align: center; margin-bottom: 14px;
    }
    .map-canvas {
      position: relative;
      background: #141414;
      border-radius: 4px;
      height: 800px;
      border: 1px solid #222;
      overflow: hidden;
    }
    .map-canvas svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .stage-label {
      position: absolute; left: 38%; top: 38%;
      width: 24%; height: 24%;
      background: rgba(249,115,22,0.1);
      border: 2px dashed var(--orange);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-size: 10px; color: var(--orange);
      letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
    }
    .map-pin {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer; z-index: 10;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      pointer-events: auto;
    }
    .pin-dot {
      width: 30px; height: 30px;
      background: var(--orange);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 3px solid #111;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px rgba(249,115,22,0.5);
      transition: all 0.2s;
      font-size: 11px;
    }
    .pin-dot span { transform: rotate(45deg); display: block; }
    .pin-dot.hovered { background: #fff; box-shadow: 0 0 20px rgba(249,115,22,0.8); }
    .pin-label {
      text-align: center; margin-top: 3px;
      font-family: 'Oswald', sans-serif;
      font-size: 8px; color: var(--orange); letter-spacing: 1px;
    }
    .pin-tooltip {
      position: absolute; bottom: 115%; left: 50%;
      transform: translateX(-50%);
      background: #000; border: 1px solid var(--orange);
      color: var(--text); border-radius: 3px;
      padding: 7px 11px; white-space: nowrap;
      font-size: 12px; z-index: 30;
      box-shadow: 0 4px 20px rgba(249,115,22,0.3);
      pointer-events: none;
    }
    .pin-tooltip strong { display: block; font-weight: 600; }
    .pin-tooltip em { color: var(--orange); font-style: normal; font-size: 11px; }
    .map-legend {
      display: flex; flex-wrap: wrap; gap: 8px 16px;
      justify-content: center; margin-top: 12px;
    }
    .legend-item {
      font-size: 11px; color: var(--dim);
      display: flex; align-items: center; gap: 5px;
    }
    .legend-dot { width: 7px; height: 7px; background: var(--orange); border-radius: 50%; flex-shrink: 0; }
    .vendor-list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }
    .vendor-list-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-left: 4px solid var(--orange);
      border-radius: 4px; padding: 13px 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .vendor-list-name { font-family: 'Oswald', sans-serif; font-size: 14px; color: var(--text); font-weight: 600; }
    .vendor-list-spec { font-size: 11px; color: var(--orange); margin-top: 2px; }
    .booth-tag {
      background: var(--orange); color: #000;
      font-family: 'Oswald', sans-serif;
      font-size: 12px; font-weight: 700;
      padding: 4px 10px; border-radius: 2px; letter-spacing: 1px;
      flex-shrink: 0;
    }

    /* ── SUB TABS ── */
    .sub-tabs {
      display: flex; gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .sub-tabs::-webkit-scrollbar { display: none; }
    .sub-tab {
      background: transparent; border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      color: var(--muted); padding: 10px 18px;
      cursor: pointer;
      font-family: 'Oswald', sans-serif;
      font-size: 12px; letter-spacing: 2px;
      text-transform: uppercase; transition: all 0.2s;
      white-space: nowrap; flex-shrink: 0;
    }
    .sub-tab:hover { color: var(--orange); }
    .sub-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

    /* ── FORMS ── */
    .info-banner {
      background: var(--bg2); border: 1px solid var(--orange);
      border-radius: 4px; padding: 13px 16px;
      margin-bottom: 20px;
      display: flex; gap: 20px; flex-wrap: wrap;
    }
    .info-item { display: flex; flex-direction: column; gap: 2px; }
    .info-item strong { color: var(--orange); font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
    .info-item span { color: var(--text); font-size: 13px; font-weight: 600; }

    .form-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 4px; padding: 22px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field.full { grid-column: 1 / -1; }
    .form-label {
      font-family: 'Oswald', sans-serif;
      font-size: 10px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted);
    }
    .form-input {
      background: #111; border: 2px solid var(--border);
      border-radius: 3px; padding: 10px 12px;
      color: var(--text); font-family: 'Barlow', sans-serif;
      font-size: 14px; outline: none;
      transition: border 0.2s; width: 100%;
    }
    .form-input:focus { border-color: var(--orange); }
    .form-input::placeholder { color: #444; }
    textarea.form-input { resize: vertical; }

    .section-sub {
      font-family: 'Oswald', sans-serif;
      font-size: 12px; letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 12px; margin-top: 22px;
    }

    /* Space selector */
    .space-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .space-card {
      background: #111; border: 2px solid var(--border);
      border-radius: 4px; padding: 13px 14px;
      cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .space-card:hover { border-color: var(--orange); }
    .space-card.selected { border-color: var(--orange); background: #1e1008; }
    .space-title { font-family: 'Oswald', sans-serif; font-size: 14px; color: var(--text); font-weight: 700; }
    .space-fee { color: var(--orange); font-size: 12px; margin-top: 3px; }
    .space-note { color: var(--dim); font-size: 10px; margin-top: 3px; }

    .toggle-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .toggle-btn {
      background: #111; border: 2px solid var(--border);
      border-radius: 3px; padding: 8px 14px;
      color: var(--muted);
      font-family: 'Oswald', sans-serif;
      font-size: 11px; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-btn.selected { border-color: var(--orange); color: var(--orange); background: #1e1008; }

    .checkbox-row {
      display: flex; align-items: center;
      gap: 10px; margin-top: 10px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .checkbox-box {
      width: 18px; height: 18px;
      border: 2px solid #444; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
    }
    .checkbox-box.checked { border-color: var(--orange); background: var(--orange); }
    .checkbox-check { color: #000; font-size: 11px; font-weight: 900; line-height: 1; }
    .checkbox-label { font-size: 13px; color: #aaa; }

    .contest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .contest-item {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .contest-item span { font-size: 12px; color: #aaa; }

    .submit-btn {
      width: 100%; margin-top: 22px;
      background: var(--orange); color: #000;
      border: none; border-radius: 3px;
      padding: 14px 0;
      font-family: 'Oswald', sans-serif;
      font-size: 15px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .submit-btn:hover { background: var(--orange-light); }
    .submit-btn:disabled { background: var(--border); color: #444; cursor: not-allowed; }
    .form-note { text-align: center; color: #444; font-size: 10px; font-family: 'Oswald', sans-serif; letter-spacing: 2px; margin-top: 10px; }

    /* ── SUCCESS ── */
    .success-card {
      text-align: center; background: var(--bg2);
      border: 2px solid var(--orange); border-radius: 4px;
      padding: 48px 28px;
    }
    .success-icon { font-size: 58px; }
    .success-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 28px; color: var(--orange);
      margin-top: 14px; letter-spacing: 1px;
    }
    .success-msg { color: #aaa; font-size: 14px; margin-top: 10px; line-height: 1.7; }
    .success-msg strong { color: var(--text); }
    .reset-btn {
      margin-top: 22px; background: transparent;
      border: 2px solid var(--orange); color: var(--orange);
      border-radius: 3px; padding: 10px 26px;
      font-family: 'Oswald', sans-serif;
      font-size: 12px; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer;
      transition: all 0.2s;
    }
    .reset-btn:hover { background: var(--orange); color: #000; }

    /* ── SPONSOR ── */
    .sponsor-grid { display: flex; flex-direction: column; gap: 10px; }
    .sponsor-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-left: 5px solid; border-radius: 4px;
      padding: 14px 18px;
      display: flex; align-items: flex-start; gap: 14px;
      cursor: pointer; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .sponsor-card:hover { filter: brightness(1.1); }
    .sponsor-card.selected-tier { background: #1e1008; outline: 2px solid currentColor; }
    .sponsor-meta { min-width: 110px; }
    .sponsor-level { font-family: 'Black Han Sans', sans-serif; font-size: 17px; }
    .sponsor-price { font-family: 'Oswald', sans-serif; font-size: 12px; color: #aaa; letter-spacing: 1px; margin-top: 1px; }
    .selected-badge {
      margin-top: 6px; background: currentColor;
      font-size: 9px; font-family: 'Oswald', sans-serif;
      font-weight: 700; letter-spacing: 1px;
      padding: 2px 8px; border-radius: 2px;
      display: inline-block;
    }
    .selected-badge span { color: #000; }
    .sponsor-perks { list-style: none; flex: 1; }
    .sponsor-perks li { font-size: 12px; color: #bbb; padding: 2px 0; }
    .sponsor-perks li::before { content: '✓ '; color: var(--orange); font-weight: bold; }

    /* ── RULES ── */
    .rules-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .rules-list li {
      background: var(--bg2); border: 1px solid #222;
      border-radius: 3px;
      padding: 11px 12px 11px 38px;
      font-size: 13px; color: #bbb;
      line-height: 1.5; position: relative;
    }
    .rules-list li::before {
      content: attr(data-n);
      position: absolute; left: 12px; top: 11px;
      font-family: 'Oswald', sans-serif;
      color: var(--orange); font-weight: 700; font-size: 11px;
    }

    .payment-note {
      background: var(--bg2); border: 1px solid var(--orange);
      border-radius: 4px; padding: 14px 16px;
      font-size: 12px; color: #aaa; line-height: 1.7;
      margin-top: 18px;
    }
    .payment-note strong { color: var(--text); }
    .payment-note .em { color: var(--orange); }

    /* ── FOOTER ── */
    footer {
      background: #000; border-top: 2px solid #1a1a1a;
      text-align: center; padding: 18px;
      font-family: 'Oswald', sans-serif;
      font-size: 11px; letter-spacing: 3px;
      color: #444; text-transform: uppercase;
    }
    footer span { color: var(--orange); }

    /* ── INSTALL BANNER ── */
    #install-banner {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a1a1a; border-top: 2px solid var(--orange);
      padding: 14px 16px;
      z-index: 500;
      align-items: center; gap: 12px;
      font-family: 'Barlow', sans-serif;
    }
    #install-banner p { flex: 1; font-size: 13px; color: #ccc; }
    #install-banner p strong { color: var(--orange); }
    #install-yes {
      background: var(--orange); color: #000;
      border: none; border-radius: 3px;
      padding: 9px 18px;
      font-family: 'Oswald', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 2px; cursor: pointer;
    }
    #install-no {
      background: transparent; color: #666;
      border: 1px solid #444; border-radius: 3px;
      padding: 9px 14px;
      font-family: 'Oswald', sans-serif;
      font-size: 11px; cursor: pointer;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .space-grid { grid-template-columns: 1fr; }
      .contest-grid { grid-template-columns: 1fr; }
      .header-date { display: none; }
      .header-title { font-size: 19px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <button id="hidden-admin-btn" class="logo-badge" style="background: #000;border: 3px solid var(--orange);border-radius: 50%;display: flex;align-items: center;justify-content: center;font-size: 26px;flex-shrink: 0;box-shadow: 0 0 20px rgba(249,115,22,0.4);cursor:pointer;width:58px;height:58px;padding:0;-webkit-tap-highlight-color:transparent">🐓</button>
      <div class="header-text">
        <div class="header-sup">Swoyersville · Est. 2023</div>
        <div class="header-title">Chicken Wing <span>Fling</span></div>
      </div>
      <div class="header-date">Jul 25–26, 2026<br>Roosevelt Field, PA</div>
    </div>
    <nav id="main-nav">
      <button class="nav-btn active" data-tab="vote">Vote</button>
      <button class="nav-btn" data-tab="map">Map</button>
      <!-- <button class="nav-btn" data-tab="apply">Apply</button> -->
      <button class="nav-btn" data-tab="sponsor">Sponsor</button>
    </nav>
  </header>

  <!-- NOTIFICATIONS PANEL -->

// Load saved data from Firebase + localStorage
function loadSavedData() {
  try {
    // Load user's personal votes from localStorage
    const userVotesSaved = localStorage.getItem('userVotes');
    if (userVotesSaved) {
      state.userVotes = JSON.parse(userVotesSaved);
      console.log('✓ Loaded user votes:', state.userVotes);
    }
    
    // Load from Firebase
    if (typeof window.db !== 'undefined') {
      window.db.ref('appData').once('value', (snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          if (data.vendors) state.vendors = data.vendors;
          if (data.seatingAreas) state.seatingAreas = data.seatingAreas;
          if (data.stage) state.stage = data.stage;
          console.log('✓ Loaded from Firebase');
          render(); // Re-render after loading
        }
      }).catch(err => console.error('Firebase load error:', err));
    }
    
    // Also load submissions from localStorage
    const saved = localStorage.getItem('wingfling_data');
    if (saved) {
      const data = JSON.parse(saved);
      if (data.submissions) state.submissions = data.submissions;
    }
  } catch (err) {
    console.error('Error loading saved data:', err);
  }
}

// Save data to Firebase + localStorage
function saveData() {
  if (!firebaseReady || typeof window.db === 'undefined') return; // Don't save if Firebase isn't ready yet
  
  try {
    // Save shared data to Firebase
    const dataToSave = {
      vendors: state.vendors,
      seatingAreas: state.seatingAreas,
      stage: state.stage
    };
    window.db.ref('appData').set(dataToSave)
      .catch(err => console.error('Firebase save error:', err));
    
    // Save local submissions to localStorage
    const localData = {
      submissions: state.submissions
    };
    localStorage.setItem('wingfling_data', JSON.stringify(localData));
  } catch (err) {
    console.error('Error saving data:', err);
  }
}

// Listen for real-time changes from other users
function setupRealtimeListeners() {
  if (typeof window.db === 'undefined') return;
  
  window.db.ref('appData').on('value', (snapshot) => {
    if (snapshot.exists()) {
      const data = snapshot.val();
      // Update state from Firebase
      if (data.vendors && JSON.stringify(data.vendors) !== JSON.stringify(state.vendors)) {
        state.vendors = data.vendors;
      }
      if (data.seatingAreas && JSON.stringify(data.seatingAreas) !== JSON.stringify(state.seatingAreas)) {
        state.seatingAreas = data.seatingAreas;
      }
      if (data.stage && JSON.stringify(data.stage) !== JSON.stringify(state.stage)) {
        state.stage = data.stage;
      }
      // Re-render if vendors or seating changed
      if (JSON.stringify(data.vendors) !== JSON.stringify(state.vendors)) {
        // Only re-render if we're not currently editing (to avoid interrupting user)
        if (!state.showAddSeatingForm && !state.editingStageSize && !state.adminMode) {
          render();
        }
      }
    }
  });
}

// These will be called at the end after Firebase initializes

let firebaseReady = false;

function render() {

    case 'sponsor': main.innerHTML = renderSponsor(); break;

}

      ${state.showVendorImport ? `

}

// ─────────────────────────────────────────────
function renderApply() {
  const tabs = `
    <div class="sub-tabs">
      <button class="sub-tab${state.applySection==='vendor'?' active':''}" data-asec="vendor">Vendor Application</button>
      <button class="sub-tab${state.applySection==='rules'?' active':''}" data-asec="rules">Rules &amp; Requirements</button>
    </div>`;

  if (state.applySection === 'rules') return `
    <div class="section-header"><h2>Get <span>Involved</span></h2><div class="divider-line"></div></div>
    ${tabs}
    <p style="color:#888;font-size:14px;margin-bottom:18px">All vendors must comply with the following. Violations may result in removal from the event.</p>
    <ul class="rules-list">
      ${RULES.map((r,i)=>`<li data-n="${i+1}.">${r}</li>`).join('')}

// ─────────────────────────────────────────────
// EVENT BINDING
// ─────────────────────────────────────────────
function bindEvents() {
  // ── VOTE (SET PENDING) ──
  document.querySelectorAll('[data-voteid]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const cat = "People's Choice";
      // Allow changing vote anytime
      const id = +el.dataset.voteid;
      state.pendingVotes[cat] = id;
      render();
    });
  });

  // ── LOCK VOTE ──
  const lockBtn = document.getElementById('lock-vote-btn');
  if (lockBtn) {
    lockBtn.addEventListener('click', () => {
      const cat = "People's Choice";
      const pendingId = state.pendingVotes[cat];
      console.log('Lock vote clicked. Pending ID:', pendingId, 'Category:', cat);
      if (!pendingId) {
        console.log('No pending vote to lock');
        return;
      }
      
      // Check if user already voted - if so, remove old vote count
      const oldVoteId = state.userVotes[cat];
      if (oldVoteId && oldVoteId !== pendingId) {
        state.vendors = state.vendors.map(v =>
          v.id === oldVoteId
            ? {...v, votes: {...(v.votes || {}), [cat]: Math.max(0, ((v.votes && v.votes[cat]) || 0) - 1)}}
            : v
        );
      }
      
      // Lock this user's vote locally
      state.userVotes[cat] = pendingId;
      localStorage.setItem('userVotes', JSON.stringify(state.userVotes));
      console.log('User vote saved:', state.userVotes);
      
      // Increment vote count for new choice
      state.vendors = state.vendors.map(v => 
        v.id === pendingId
          ? {...v, votes: {...(v.votes || {}), [cat]: ((v.votes && v.votes[cat])||0)+1}}
          : v
      );
      console.log('Vote count updated:', state.vendors);
      
      // Clear pending vote for this category
      state.pendingVotes[cat] = null;
      
      render();
    });
  }

  // ── CLEAR VOTE ──
  const clearBtn = document.getElementById('clear-vote-btn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      const cat = "People's Choice";
      state.pendingVotes[cat] = null;
      render();
    });
  }

  // ── CHANGE VOTE ──
  const changeVoteBtn = document.getElementById('change-vote-btn');
  if (changeVoteBtn) {
    changeVoteBtn.addEventListener('click', () => {
      const cat = "People's Choice";
      // Clear current vote to allow selecting a new one
      state.pendingVotes[cat] = null;
      render();
    });
  }

  // ── COMPETITION RESULTS EDITOR ──
  const editCompBtn = document.getElementById('edit-competition-btn');
  if (editCompBtn) {
    editCompBtn.addEventListener('click', () => {
      state.showCompetitionEditor = !state.showCompetitionEditor;
      render();
    });
  }

  const saveCompBtn = document.getElementById('save-competition-btn');
  if (saveCompBtn) {
    saveCompBtn.addEventListener('click', () => {
      // Get all selected winners from the selects
      document.querySelectorAll('.comp-winner-select').forEach(select => {
        const cat = select.dataset.category;
        const winnerId = +select.value || null;
        if (winnerId) {
          state.competitionWinners[cat] = winnerId;
        } else {
          delete state.competitionWinners[cat];
        }
      });
      state.showCompetitionEditor = false;
      render();
    });
  }

  const cancelCompBtn = document.getElementById('cancel-competition-btn');
  if (cancelCompBtn) {
    cancelCompBtn.addEventListener('click', () => {
      state.showCompetitionEditor = false;
      render();
    });
  }

  // ── RESET VOTES (ADMIN ONLY) ──
  const resetVotesBtn = document.getElementById('reset-votes-btn');
  if (resetVotesBtn) {
    resetVotesBtn.addEventListener('click', () => {
      const confirmed = confirm('⚠️ This will reset ALL vote counts to 0 and clear all user votes. Are you sure?');
      if (confirmed) {
        // Reset vote counts for all vendors
        state.vendors = state.vendors.map(v => ({
          ...v,
          votes: {...v.votes, "People's Choice": 0}
        }));
        
        // Clear all user votes from localStorage
        localStorage.removeItem('userVotes');
        state.userVotes = {};
        
        // Clear pending votes
        state.pendingVotes = {};
        
        console.log('✓ All votes reset to 0');
        render();
      }
    });
  }

  // ── FILTER BUTTONS ──
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.vendorFilter = btn.dataset.filter;
      state.selectedVendorId = null;
      render();
    });
  });

  // ── VENDOR SELECTION FROM MAP ──
  document.querySelectorAll('[data-pin]').forEach(el => {
    const id = el.dataset.pin;
    const tip = document.getElementById(`tip-${id}`);
    const dot = document.getElementById(`pin-${id}`);
    
    el.addEventListener('mouseenter', () => { 
      if(tip && !state.adminMode) tip.style.display='block'; 
      if(dot) dot.classList.add('hovered'); 
    });
    el.addEventListener('mouseleave', () => { 
      if(tip) tip.style.display='none'; 
      if(dot) dot.classList.remove('hovered'); 
    });
    el.addEventListener('click', (e) => {
      if (state.adminMode) return;
      e.stopPropagation();
      const vendorId = +id;
      state.selectedVendorId = state.selectedVendorId === vendorId ? null : vendorId;
      render();
    });

    // Drag in admin mode - both mouse and touch
    const startDrag = (e) => {
      if (!state.adminMode || !state.isAuthenticated) return;
      if (e.target.classList.contains('vendor-delete-btn')) return;
      
      e.preventDefault();
      const vendorId = +el.dataset.vendorid;
      const mapCanvas = document.getElementById('map-canvas');
      const rect = mapCanvas.getBoundingClientRect();
      el.style.opacity = '0.6';
      el.style.zIndex = '100';
      
      const move = (ev) => {
        let clientX, clientY;
        if (ev.touches) {
          clientX = ev.touches[0].clientX;
          clientY = ev.touches[0].clientY;
        } else {
          clientX = ev.clientX;
          clientY = ev.clientY;
        }
        
        const x = ((clientX - rect.left) / rect.width) * 100;
        const y = ((clientY - rect.top) / rect.height) * 100;
        el.style.left = Math.max(0, Math.min(100, x)) + '%';
        el.style.top = Math.max(0, Math.min(100, y)) + '%';
      };
      
      const stop = () => {
        el.style.opacity = '1';
        el.style.zIndex = '10';
        const x = Math.max(0, Math.min(100, parseFloat(el.style.left)));
        const y = Math.max(0, Math.min(100, parseFloat(el.style.top)));
        state.vendors = state.vendors.map(v => v.id === vendorId ? {...v, loc: {x, y}} : v);
        render();
        document.removeEventListener('mousemove', move);
        document.removeEventListener('touchmove', move);
        document.removeEventListener('mouseup', stop);
        document.removeEventListener('touchend', stop);
      };
      
      document.addEventListener('mousemove', move);
      document.addEventListener('touchmove', move, { passive: false });
      document.addEventListener('mouseup', stop);
      document.addEventListener('touchend', stop);
    };
    
    el.addEventListener('mousedown', startDrag);
    el.addEventListener('touchstart', startDrag, { passive: false });
  });

  // ── VENDOR SELECTION FROM LIST ──
  document.querySelectorAll('.vendor-list-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.filter-btn')) return; // Don't select if clicking filter
      const vendorId = +card.dataset.vendorid;
      state.selectedVendorId = state.selectedVendorId === vendorId ? null : vendorId;
      render();
    });
  });

  // ── DELETE VENDOR ──
  document.querySelectorAll('.vendor-delete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = +btn.dataset.id;
      state.vendors = state.vendors.filter(v => v.id !== id);
      render();
    });
  });

  // ── STAGE DRAG ──
  const stageEl = document.getElementById('stage-element');
  if (stageEl && state.adminMode && state.isAuthenticated) {
    const dragStage = (e) => {
      if (!state.adminMode) return;
      e.preventDefault();
      const mapCanvas = document.getElementById('map-canvas');
      const rect = mapCanvas.getBoundingClientRect();
      stageEl.style.opacity = '0.6';
      stageEl.style.zIndex = '50';
      
      const move = (ev) => {
        let clientX, clientY;
        if (ev.touches) {
          clientX = ev.touches[0].clientX;
          clientY = ev.touches[0].clientY;
        } else {
          clientX = ev.clientX;
          clientY = ev.clientY;
        }
        const x = ((clientX - rect.left) / rect.width) * 100;
        const y = ((clientY - rect.top) / rect.height) * 100;
        stageEl.style.left = Math.max(0, Math.min(100, x)) + '%';
        stageEl.style.top = Math.max(0, Math.min(100, y)) + '%';
      };
      
      const stop = () => {
        stageEl.style.opacity = '1';
        stageEl.style.zIndex = '5';
        const x = Math.max(0, Math.min(100, parseFloat(stageEl.style.left)));
        const y = Math.max(0, Math.min(100, parseFloat(stageEl.style.top)));
        state.stage = {...state.stage, x, y}; // Keep width and height!
        render();
        document.removeEventListener('mousemove', move);
        document.removeEventListener('touchmove', move);
        document.removeEventListener('mouseup', stop);
        document.removeEventListener('touchend', stop);
      };
      
      document.addEventListener('mousemove', move);
      document.addEventListener('touchmove', move, { passive: false });
      document.addEventListener('mouseup', stop);
      document.addEventListener('touchend', stop);
    };
    stageEl.addEventListener('mousedown', dragStage);
    stageEl.addEventListener('touchstart', dragStage, { passive: false });
  }

  // ── SEATING DRAG ──
  document.querySelectorAll('.seating-area').forEach(seatEl => {

        if (!state.adminMode) return;
        if (e.target.classList.contains('seating-delete')) return;
        e.preventDefault();
        const seatId = seatEl.dataset.seatingid;
        const mapCanvas = document.getElementById('map-canvas');
        const rect = mapCanvas.getBoundingClientRect();
        seatEl.style.opacity = '0.6';
        seatEl.style.zIndex = '50';
        
        const move = (ev) => {
          let clientX, clientY;
          if (ev.touches) {
            clientX = ev.touches[0].clientX;
            clientY = ev.touches[0].clientY;
          } else {
            clientX = ev.clientX;
            clientY = ev.clientY;
          }
          const x = ((clientX - rect.left) / rect.width) * 100;
          const y = ((clientY - rect.top) / rect.height) * 100;
          seatEl.style.left = Math.max(0, Math.min(100, x)) + '%';
          seatEl.style.top = Math.max(0, Math.min(100, y)) + '%';
        };
        
        const stop = () => {
          seatEl.style.opacity = '1';
          seatEl.style.zIndex = '4';
          const x = Math.max(0, Math.min(100, parseFloat(seatEl.style.left)));
          const y = Math.max(0, Math.min(100, parseFloat(seatEl.style.top)));
          state.seatingAreas = state.seatingAreas.map(s => s.id === seatId ? {...s, x, y} : s);
          render();
          document.removeEventListener('mousemove', move);
          document.removeEventListener('touchmove', move);
          document.removeEventListener('mouseup', stop);
          document.removeEventListener('touchend', stop);
        };
        
        document.addEventListener('mousemove', move);
        document.addEventListener('touchmove', move, { passive: false });
        document.addEventListener('mouseup', stop);
        document.addEventListener('touchend', stop);

      seatEl.addEventListener('mousedown', dragSeating);

      reader.onload = (e) => {

        }
        
        const lines = csv.trim().split('\n');
        const newVendors = [];
        let errors = [];
        
        lines.forEach((line, idx) => {
          if (!line.trim()) return; // skip empty lines
          const parts = line.split(',').map(p => p.trim());
          
          if (parts.length < 6) {
            errors.push(`Row ${idx + 1}: Missing fields`);
            return;
          }
          
          const [name, booth, specialty, type, xStr, yStr, categoriesStr] = parts;
          const x = parseFloat(xStr);

            errors.push(`Row ${idx + 1}: Invalid X/Y coordinates`);
            return;

          if (!['wing', 'craft', 'nonfood'].includes(type)) {
            errors.push(`Row ${idx + 1}: Type must be 'wing', 'craft', or 'nonfood'`);
            return;
          }
          
          // Parse categories - handle both quoted and unquoted
          let categories = [];
          if (categoriesStr && categoriesStr !== '""' && categoriesStr.trim()) {
            categories = categoriesStr
              .replace(/^"|"$/g, '') // Remove outer quotes if present

          type,
          loc: { x, y },
          categories: voteCategories, // This is used for voting

    updateNotifications();
    
    state.sponsorSubmitted = true;
    render();
  });

  // ── SPONSOR RESET ──
  const srBtn = document.getElementById('sponsor-reset');
  if (srBtn) srBtn.addEventListener('click', () => {
    state.sponsorSubmitted = false;
    state.selectedLevel = null;
    state.selectedShirt = null;
    state.sForm = { bizName:'',contact:'',phone:'',email:'',donation:'' };
    render();
  });
}

function updateVendorSubmitBtn() {
  const btn = document.getElementById('vendor-submit');
  if (!btn) return;
  const ok = state.vForm.vendorName && state.vForm.contactName && state.vForm.email && state.selectedSpace && state.vendorAgree;
  btn.disabled = !ok;
}

function updateSponsorSubmitBtn() {
  const btn = document.getElementById('sponsor-submit');
  if (!btn) return;
  btn.disabled = !(state.sForm.bizName && state.sForm.contact && state.sForm.email && state.selectedLevel && state.sponsorAgree);
}

// ─────────────────────────────────────────────
// MAIN NAV
// ─────────────────────────────────────────────
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.tab = btn.dataset.tab;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ─────────────────────────────────────────────
// PWA — Service Worker & Install Banner
// ─────────────────────────────────────────────
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('Service Worker registered');
  }).catch(err => {
    console.log('Service Worker registration not available in this context');
  });
} else if (location.protocol !== 'https:') {
  console.log('Service Worker requires HTTPS. App works offline-first only over secure connection.');
}

let deferredPrompt = null;
const installBanner = document.getElementById('install-banner');

// Only enable PWA install on HTTPS or localhost
if (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBanner.style.display = 'flex';
  });

  document.getElementById('install-yes').addEventListener('click', async () => {
    installBanner.style.display = 'none';
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
    }
  });

  document.getElementById('install-no').addEventListener('click', () => {
    installBanner.style.display = 'none';
  });

  window.addEventListener('appinstalled', () => {
    installBanner.style.display = 'none';
    deferredPrompt = null;
  });
} else {
  // Hide install banner on non-HTTPS
  installBanner.style.display = 'none';
}

// ─────────────────────────────────────────────
// NOTIFICATIONS
// ─────────────────────────────────────────────
function updateNotifications() {
  const btn = document.getElementById('notif-btn');
  const count = document.getElementById('notif-count');
  const list = document.getElementById('notif-list');
  
  const total = state.submissions.length;
  if (btn) {
    btn.style.display = total > 0 ? 'flex' : 'none';
    if (count) count.textContent = total;
  }
  
  if (list) {
    list.innerHTML = state.submissions.map((sub, i) => {
      if (sub.type === 'vendor') {
        return `
          <div style="padding:12px 16px;border-bottom:1px solid #222;font-size:12px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <strong style="color:#f97316">New Vendor</strong>
              <span style="color:#666;font-size:11px">${sub.timestamp.split(',')[0]}</span>
            </div>
            <div style="color:#bbb">${sub.name}</div>
            <div style="color:#888;font-size:11px;margin-top:2px">${sub.contact} · ${sub.email}</div>
            <div style="color:#666;font-size:11px;margin-top:3px">📦 ${sub.space}</div>
          </div>`;
      } else {
        return `
          <div style="padding:12px 16px;border-bottom:1px solid #222;font-size:12px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <strong style="color:#fb923c">New Sponsor</strong>
              <span style="color:#666;font-size:11px">${sub.timestamp.split(',')[0]}</span>
            </div>
            <div style="color:#bbb">${sub.name}</div>
            <div style="color:#888;font-size:11px;margin-top:2px">${sub.contact} · ${sub.email}</div>
            <div style="color:#666;font-size:11px;margin-top:3px">🏆 ${sub.level} · ${sub.event}</div>
          </div>`;
      }
    }).join('');
  }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
render();
updateNotifications();

// Notification panel toggle
document.getElementById('notif-btn').addEventListener('click', () => {
  state.showNotifications = !state.showNotifications;
  const panel = document.getElementById('notifications-panel');
  if (panel) panel.style.display = state.showNotifications ? 'block' : 'none';
});

document.getElementById('close-notif').addEventListener('click', () => {
  state.showNotifications = false;
  const panel = document.getElementById('notifications-panel');
  if (panel) panel.style.display = 'none';
});
